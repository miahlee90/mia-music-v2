<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teacher Dashboard · Theory Lab</title>
<link rel="stylesheet" href="css/style.css?v=20260717b">
<meta name="theme-color" content="#1c1e54">
<style>
.td-wrap{max-width:1100px;margin:0 auto;padding:0 12px}
.td-card{background:#fff;border:1.5px solid #e5dcc3;border-radius:14px;padding:16px;margin:12px 0}
.td-card input,.td-card select,.td-card textarea{font-size:15px;padding:9px;border:2px solid #cdd5e1;border-radius:8px;box-sizing:border-box}
.td-card button{min-height:40px}
.td-stats{display:flex;gap:10px;flex-wrap:wrap}
.td-stat{flex:1 1 130px;background:#f6f1e2;border-radius:10px;padding:10px;text-align:center}
.td-stat b{display:block;font-size:22px}
.td-matrix{overflow-x:auto}
.td-matrix table{border-collapse:collapse;font-size:12.5px;min-width:760px}
.td-matrix th,.td-matrix td{border:1px solid #e2dac2;padding:5px 6px;text-align:center;white-space:nowrap}
.td-matrix th{background:#eef1ff;position:sticky;top:0}
.td-matrix td:first-child,.td-matrix th:first-child{position:sticky;left:0;background:#fff;text-align:left;font-weight:700}
.td-cell{cursor:pointer}
.td-c100{background:#dcfce7}.td-cpart{background:#fef9c3}.td-c0{background:#fff}
.td-err{color:#b91c1c;font-weight:700;min-height:18px}
.td-modal{position:fixed;inset:0;background:rgba(20,20,40,.5);display:flex;align-items:center;justify-content:center;z-index:999;padding:12px}
.td-modal>div{background:#fff;border-radius:14px;padding:18px;max-width:860px;width:100%;max-height:88vh;overflow:auto}
.td-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin:6px 0}
.td-small{font-size:12.5px;color:#666}
.td-tbl{width:100%;border-collapse:collapse;font-size:13px}
.td-tbl th,.td-tbl td{border-bottom:1px solid #eee;padding:6px 8px;text-align:left}
@media(max-width:700px){ .td-stats{gap:6px} .td-stat{flex-basis:44%} }
</style>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
</head>
<body>
<header class="lesson-header"><div class="inner">
  <div class="crumb"><a href="index.html">🏠 Home</a> · <a href="owner.html" id="ownerLink" style="display:none">Owner Dashboard</a></div>
  <h1>Teacher Dashboard</h1>
</div></header>
<main class="td-wrap" id="app"><div class="td-card">Loading…</div></main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/lessons-data.js?v=20260717b"></script>
<script src="js/curriculum.js?v=20260717b"></script>
<script src="js/config.js?v=20260717b"></script>
<script>
(async function(){
  const app=document.getElementById("app");
  const fmt=d=>d?new Date(d).toLocaleDateString(undefined,{year:"numeric",month:"long",day:"numeric"}):"—";
  const fmtT=d=>d?new Date(d).toLocaleString(undefined,{dateStyle:"medium",timeStyle:"short"}):"—";
  const pct=(a,b)=>b?Math.round(100*a/b):0;
  const esc=s=>String(s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
  if(!LMS_CONFIG.SUPABASE_URL||!LMS_CONFIG.SUPABASE_ANON_KEY){
    app.innerHTML=`<div class="td-card"><h2>Not configured</h2><p>Fill in <code>js/config.js</code> with your Supabase project URL and publishable key first (see supabase/SETUP.md).</p></div>`;
    return;
  }
  const sb=supabase.createClient(LMS_CONFIG.SUPABASE_URL,LMS_CONFIG.SUPABASE_ANON_KEY);
  async function rpc(fn,args){ const {data,error}=await sb.rpc(fn,args||{}); if(error) throw error; return data; }

  let {data:{session}}=await sb.auth.getSession();
  if(!session) return renderLogin();
  boot();

  function renderLogin(msg){
    app.innerHTML=`<div class="td-card" style="max-width:460px;margin:24px auto">
      <h2>Teacher Sign-in</h2>
      <p class="td-small">Enter your approved teacher email. You'll receive a one-time sign-in link — or use a password if the administrator set one for you.</p>
      <div class="td-row"><input id="em" type="email" placeholder="you@example.com" style="flex:1"><button id="go">Send link</button></div>
      <div class="td-row"><input id="pw" type="password" placeholder="…or password (optional)" style="flex:1"><button id="goPw">Sign in</button></div>
      <p class="td-err" id="err">${msg||""}</p></div>`;
    document.getElementById("go").onclick=async()=>{
      const email=document.getElementById("em").value.trim();
      const b=document.getElementById("go"); b.disabled=true;
      const {error}=await sb.auth.signInWithOtp({email,
        options:{shouldCreateUser:false, emailRedirectTo:location.href.split("#")[0]}});
      if(error) { document.getElementById("err").textContent=
        /not.*found|signups/i.test(error.message)?"This email is not authorized. Please contact the course administrator.":error.message;
        b.disabled=false; }
      else document.getElementById("err").innerHTML='<span style="color:#166534">Check your email and open the sign-in link on THIS device.</span>';
    };
    document.getElementById("goPw").onclick=async()=>{
      const {error}=await sb.auth.signInWithPassword({
        email:document.getElementById("em").value.trim(),
        password:document.getElementById("pw").value});
      if(error) document.getElementById("err").textContent=error.message;
      else location.reload();
    };
  }

  async function boot(){
    let hello;
    try{ hello=await rpc("teacher_hello"); }
    catch(e){ app.innerHTML=`<div class="td-card td-err">${esc(e.message)}</div>`; return; }
    if(!hello.ok){
      app.innerHTML=`<div class="td-card"><p class="td-err">${esc(hello.message||"This email is not authorized. Please contact the course administrator.")}</p>
        <button onclick="location.reload()">Back</button></div>`;
      await sb.auth.signOut(); return;
    }
    if(hello.owner) document.getElementById("ownerLink").style.display="";
    renderClasses();
  }

  async function renderClasses(){
    app.innerHTML=`<div class="td-card">Loading classes…</div>`;
    const {data:classes,error}=await sb.from("classes").select("*").order("created_at");
    if(error){ app.innerHTML=`<div class="td-card td-err">${esc(error.message)}</div>`; return; }
    let html=`<div class="td-card"><div class="td-row" style="justify-content:space-between">
      <h2 style="margin:0">My Classes</h2>
      <span><button id="newClass">+ New class</button>
      <button id="signout">Sign out</button></span></div>
      <table class="td-tbl"><tr><th>Class</th><th>Class Code</th><th>Created</th><th></th></tr>`+
      (classes||[]).map(c=>`<tr style="${c.archived?"opacity:.5":""}">
        <td><b>${esc(c.name)}</b>${c.archived?" (archived)":""}</td>
        <td><code style="font-size:15px">${c.class_code}</code></td>
        <td>${fmt(c.created_at)}</td>
        <td><button data-open="${c.id}" ${c.archived?"disabled":""}>Open</button>
            <button data-arch="${c.id}" data-to="${!c.archived}">${c.archived?"Restore":"Archive"}</button></td></tr>`).join("")+
      `</table>${(classes||[]).length?"":"<p>No classes yet — create your first one!</p>"}</div>`;
    app.innerHTML=html;
    document.getElementById("signout").onclick=async()=>{ await sb.auth.signOut(); location.reload(); };
    document.getElementById("newClass").onclick=async()=>{
      const name=prompt("Class name (e.g. 'Tuesday 4pm')"); if(!name) return;
      const r=await rpc("create_class",{p_name:name,p_course:"practical-music-theory"});
      alert("Class created!\nClass Code: "+r.classCode+"\n\nStudents will use this code to sign in.");
      renderClasses();
    };
    app.querySelectorAll("[data-open]").forEach(b=>b.onclick=()=>renderClass(b.dataset.open));
    app.querySelectorAll("[data-arch]").forEach(b=>b.onclick=async()=>{
      if(b.dataset.to==="true"&&!confirm("Archive this class? (It can be restored later.)")) return;
      await rpc("set_class_archived",{p_class:b.dataset.arch,p_archived:b.dataset.to==="true"});
      renderClasses();
    });
  }

  async function renderClass(classId){
    app.innerHTML=`<div class="td-card">Loading class…</div>`;
    let m;
    try{ m=await rpc("class_matrix",{p_class:classId}); }
    catch(e){ app.innerHTML=`<div class="td-card td-err">${esc(e.message)}</div>`; return; }
    const students=(m.students||[]).filter(s=>!s.archived);
    const archived=(m.students||[]).filter(s=>s.archived);
    const pages=CURRICULUM.pages.filter(p=>p.status==="active");
    const week=Date.now()-7*864e5;
    const activeW=students.filter(s=>s.lastActive&&new Date(s.lastActive)>week).length;
    const notStarted=students.filter(s=>!s.completedPages&&!s.lastActive).length;
    const finished=students.filter(s=>s.courseCompletedAt).length;
    const avg=students.length?Math.round(students.reduce((a,s)=>a+pct(s.completedPages,pages.length),0)/students.length):0;

    let html=`<div class="td-card">
      <div class="td-row" style="justify-content:space-between">
        <h2 style="margin:0">${esc(m.class.name)} <code style="font-size:15px">${m.class.code}</code></h2>
        <button id="back">← All classes</button></div>
      <div class="td-stats">
        <div class="td-stat"><b>${students.length}</b>active students</div>
        <div class="td-stat"><b>${avg}%</b>average completion</div>
        <div class="td-stat"><b>${activeW}</b>active this week</div>
        <div class="td-stat"><b>${notStarted}</b>not started</div>
        <div class="td-stat"><b>${finished}</b>finished course</div>
      </div>
      <div class="td-row" style="margin-top:10px">
        <button id="addStu">+ Add student</button>
        <button id="csvImp">Import names (CSV)</button>
        <button id="csvExp">Export progress CSV</button>
      </div></div>
      <div class="td-card td-matrix"><table><tr><th>Student</th>`+
      CURRICULUM.units.map(u=>`<th title="${esc(u.title)}">U${u.unit}</th>`).join("")+
      `<th>Total</th><th>Course done</th><th></th></tr>`;
    students.forEach(s=>{
      html+=`<tr><td>${esc(s.name)}<div class="td-small">${s.lastActive?"active "+fmt(s.lastActive):"never signed in"}</div></td>`;
      CURRICULUM.units.forEach(u=>{
        const c=(s.units||{})[u.unit]||{done:0,total:pages.filter(p=>p.unit===u.unit).length};
        const cls=c.done>=c.total?"td-c100":c.done>0?"td-cpart":"td-c0";
        html+=`<td class="td-cell ${cls}" data-stu="${s.id}" data-unit="${u.unit}"
          title="Unit ${u.unit}: ${c.done}/${c.total}${c.unitCompletedAt?" · completed "+fmt(c.unitCompletedAt):""}">${c.done}/${c.total}${c.unitCompletedAt?" ✅":""}</td>`;
      });
      html+=`<td><b>${s.completedPages}/${pages.length}</b><div class="td-small">${pct(s.completedPages,pages.length)}%</div></td>
        <td>${s.courseCompletedAt?"🎓 "+fmt(s.courseCompletedAt):"—"}</td>
        <td><button data-rep="${s.id}">Report</button> <button data-menu="${s.id}" data-name="${esc(s.name)}">⋯</button></td></tr>`;
    });
    html+=`</table>${students.length?"":"<p>No students yet.</p>"}</div>`;
    if(archived.length) html+=`<div class="td-card td-small">Archived: ${archived.map(s=>`${esc(s.name)} <button data-unarch="${s.id}">restore</button>`).join(" · ")}</div>`;
    app.innerHTML=html;

    document.getElementById("back").onclick=renderClasses;
    document.getElementById("addStu").onclick=async()=>{
      const name=prompt("Student display name or nickname (no personal data needed):"); if(!name) return;
      const r=await rpc("add_student",{p_class:classId,p_name:name});
      showCards([{name,classCode:r.classCode,accessCode:r.accessCode}]);
      renderClass(classId);
    };
    document.getElementById("csvImp").onclick=async()=>{
      const txt=prompt("Paste student names — one per line (or comma-separated):"); if(!txt) return;
      const names=txt.split(/[\n,]/).map(x=>x.trim()).filter(Boolean);
      const cards=[];
      for(const nm of names){ const r=await rpc("add_student",{p_class:classId,p_name:nm});
        cards.push({name:nm,classCode:r.classCode,accessCode:r.accessCode}); }
      showCards(cards);
      renderClass(classId);
    };
    document.getElementById("csvExp").onclick=()=>exportCSV(classId,m);
    app.querySelectorAll("[data-rep]").forEach(b=>b.onclick=()=>showReport(b.dataset.rep,classId));
    app.querySelectorAll("[data-unarch]").forEach(b=>b.onclick=async()=>{
      await rpc("set_student_archived",{p_student:b.dataset.unarch,p_archived:false}); renderClass(classId); });
    app.querySelectorAll(".td-cell").forEach(c=>c.onclick=()=>showReport(c.dataset.stu,classId,+c.dataset.unit));
    app.querySelectorAll("[data-menu]").forEach(b=>b.onclick=()=>studentMenu(b.dataset.menu,b.dataset.name,classId));
  }

  function studentMenu(sid,name,classId){
    modal(`<h3>${esc(name)}</h3>
      <div class="td-row"><button id="mRes">Reset access code</button>
        <button id="mArch">Archive student</button>
        <button id="mMove">Move to another class</button></div>
      <p class="td-small">Archiving hides the student but keeps all records; nothing is permanently deleted.</p>`);
    document.getElementById("mRes").onclick=async()=>{
      if(!confirm("Reset "+name+"'s access code? The old code stops working immediately.")) return;
      const r=await rpc("reset_access_code",{p_student:sid});
      closeModal(); showCards([{name,classCode:"(same class code)",accessCode:r.accessCode}]);
    };
    document.getElementById("mArch").onclick=async()=>{
      if(!confirm("Archive "+name+"?")) return;
      await rpc("set_student_archived",{p_student:sid,p_archived:true}); closeModal(); renderClass(classId);
    };
    document.getElementById("mMove").onclick=async()=>{
      const {data:cs}=await sb.from("classes").select("id,name,archived").eq("archived",false);
      const others=(cs||[]).filter(c=>c.id!==classId);
      if(!others.length) return alert("No other class to move to.");
      const pick=prompt("Move to which class?\n"+others.map((c,i)=>(i+1)+". "+c.name).join("\n")+"\n\nEnter a number:");
      const t=others[+pick-1]; if(!t) return;
      await rpc("move_student",{p_student:sid,p_from:classId,p_to:t.id});
      closeModal(); renderClass(classId);
    };
  }

  async function showReport(sid,classId,unitFilter){
    const r=await rpc("student_report",{p_student:sid});
    const P={}; (r.progress||[]).forEach(p=>{ if(p.course==="practical-music-theory") P[p.item]=p; });
    const UC={}; (r.unitCompletions||[]).forEach(u=>UC[u.unit]=u.at);
    const cc=(r.courseCompletions||[])[0];
    const pages=CURRICULUM.pages.filter(p=>p.status==="active"&&(unitFilter?p.unit===unitFilter:true));
    const doneAll=CURRICULUM.pages.filter(p=>(P[p.id]||{}).status==="completed").length;
    const lastA=Object.values(P).map(p=>p.lastActiveAt).filter(Boolean).sort().pop();
    let html=`<h3>${esc(r.student.name)}${unitFilter?` — Unit ${unitFilter}`:""}</h3>
      <p class="td-small">Overall: <b>${doneAll}/107</b> (${pct(doneAll,107)}%) · last active ${fmt(lastA)}
      ${cc?` · 🎓 course completed ${fmt(cc.at)}`:""}${unitFilter&&UC[unitFilter]?` · Unit ${unitFilter} completed ${fmt(UC[unitFilter])}`:""}</p>
      <table class="td-tbl"><tr><th></th><th>Lesson</th><th>Learn by Doing</th><th>Final Quiz (best / recent)</th><th>Completed</th><th></th></tr>`;
    pages.forEach(p=>{
      const q=P[p.id]||{}; const st=q.status||"not_started";
      const icon=st==="completed"?"✅":st==="in_progress"?"🟡":"⬜";
      const lbd=`${(q.lbdDone||[]).length}/${p.lbdIds.length}${q.lbdAttempts?` <span class="td-small">(${q.lbdAttempts}× · ${fmt(q.lbdLastAt)})</span>`:""}`;
      const quiz=q.quizBest?`${pct(q.quizBest.earned,q.quizBest.possible)}% (${q.quizBest.earned}/${q.quizBest.possible}) / ${q.quizRecent?pct(q.quizRecent.earned,q.quizRecent.possible)+"%":"—"} <span class="td-small">(${q.quizAttempts}× · ${fmt(q.quizLastAt)})</span>`:"—";
      html+=`<tr><td>${icon}</td><td><b>${p.label}</b> ${esc(p.title)}</td><td>${lbd}</td><td>${quiz}</td>
        <td>${fmt(q.completedAt)}</td>
        <td>${st==="completed"?`<button class="td-small" data-reset="${p.id}">reset…</button>`:""}</td></tr>`;
    });
    html+=`</table><div class="td-row" style="margin-top:10px"><button id="repCsv">Export this report (CSV)</button><button onclick="document.querySelector('.td-modal').remove()">Close</button></div>`;
    modal(html);
    document.getElementById("repCsv").onclick=()=>{
      const rows=[["lesson","label","title","status","lbd_done","lbd_required","lbd_attempts","quiz_best_pct","quiz_recent_pct","quiz_attempts","completed_at"]];
      CURRICULUM.pages.forEach(p=>{ const q=P[p.id]||{};
        rows.push([p.id,p.label,p.title,q.status||"not_started",(q.lbdDone||[]).length,p.lbdIds.length,
          q.lbdAttempts||0,q.quizBest?pct(q.quizBest.earned,q.quizBest.possible):"",
          q.quizRecent?pct(q.quizRecent.earned,q.quizRecent.possible):"",q.quizAttempts||0,q.completedAt||""]); });
      downloadCSV(rows,(r.student.name||"student")+"-report.csv");
    };
    document.querySelectorAll("[data-reset]").forEach(b=>b.onclick=async()=>{
      const reason=prompt("Reset this page's completion for "+r.student.name+"?\nA reason is REQUIRED (it is kept in the audit log):");
      if(!reason||!reason.trim()) return;
      await rpc("reset_page_completion",{p_student:sid,p_course:"practical-music-theory",p_item:+b.dataset.reset,p_reason:reason});
      document.querySelector(".td-modal").remove(); showReport(sid,classId,unitFilter);
    });
  }

  async function exportCSV(classId,m){
    const rows=[["student","unit","lesson","label","title","status","lbd_done","lbd_required","quiz_best_pct","quiz_recent_pct","quiz_attempts","completed_at"]];
    for(const s of (m.students||[]).filter(x=>!x.archived)){
      const r=await rpc("student_report",{p_student:s.id});
      const P={}; (r.progress||[]).forEach(p=>{ if(p.course==="practical-music-theory") P[p.item]=p; });
      CURRICULUM.pages.forEach(p=>{ const q=P[p.id]||{};
        rows.push([s.name,p.unit,p.id,p.label,p.title,q.status||"not_started",
          (q.lbdDone||[]).length,p.lbdIds.length,
          q.quizBest?pct(q.quizBest.earned,q.quizBest.possible):"",
          q.quizRecent?pct(q.quizRecent.earned,q.quizRecent.possible):"",
          q.quizAttempts||0,q.completedAt||""]); });
    }
    downloadCSV(rows,(m.class.name||"class")+"-progress.csv");
  }
  function downloadCSV(rows,name){
    const csv=rows.map(r=>r.map(v=>`"${String(v??"").replace(/"/g,'""')}"`).join(",")).join("\r\n");
    const a=document.createElement("a");
    a.href=URL.createObjectURL(new Blob(["﻿"+csv],{type:"text/csv"}));
    a.download=name; a.click();
  }

  function showCards(cards){
    const w=window.open("","_blank");
    w.document.write(`<html><head><title>Student Access Cards</title><style>
      body{font-family:system-ui,sans-serif;display:flex;flex-wrap:wrap;gap:12px;padding:16px}
      .card{border:2px dashed #533afd;border-radius:12px;padding:16px 20px;width:280px}
      .card b{font-size:18px} code{font-size:20px;letter-spacing:2px;display:block;margin:4px 0}
      .lbl{font-size:11px;color:#666;text-transform:uppercase;margin-top:8px}
      @media print{ .noprint{display:none} }</style></head><body>
      <div class="noprint" style="width:100%"><button onclick="print()">🖨 Print</button>
      <b style="color:#b91c1c"> Save or print now — access codes are shown only this once.</b></div>`+
      cards.map(c=>`<div class="card"><b>${c.name}</b>
        <div class="lbl">Website</div><code style="font-size:13px;letter-spacing:0">${location.origin+location.pathname.replace(/teacher\.html$/,"student.html")}</code>
        <div class="lbl">Class Code</div><code>${c.classCode}</code>
        <div class="lbl">Access Code</div><code>${c.accessCode}</code></div>`).join("")+
      `</body></html>`);
    w.document.close();
  }

  function modal(html){ closeModal();
    const d=document.createElement("div"); d.className="td-modal";
    d.innerHTML=`<div>${html}</div>`;
    d.onclick=e=>{ if(e.target===d) d.remove(); };
    document.body.appendChild(d);
  }
  function closeModal(){ const m=document.querySelector(".td-modal"); if(m) m.remove(); }
})();
</script>
</body>
</html>
