<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Owner Dashboard · Music Fundamentals</title>
<link rel="stylesheet" href="css/style.css?v=20260717b">
<meta name="theme-color" content="#1c1e54">
<style>
.od-wrap{max-width:900px;margin:0 auto;padding:0 12px}
.od-card{background:#fff;border:1.5px solid #e5dcc3;border-radius:14px;padding:16px;margin:12px 0}
.od-card input{font-size:15px;padding:9px;border:2px solid #cdd5e1;border-radius:8px}
.od-tbl{width:100%;border-collapse:collapse;font-size:13.5px}
.od-tbl th,.od-tbl td{border-bottom:1px solid #eee;padding:7px 8px;text-align:left;vertical-align:top}
.od-err{color:#b91c1c;font-weight:700;min-height:18px}
.od-small{font-size:12.5px;color:#666}
.st-pending{color:#b45309;font-weight:700}.st-accepted{color:#166534;font-weight:700}.st-revoked{color:#b91c1c;font-weight:700}
</style>
</head>
<body>
<header class="lesson-header"><div class="inner">
  <div class="crumb"><a href="index.html">🏠 Home</a> · <a href="teacher.html">Teacher Dashboard</a></div>
  <h1>Owner Dashboard</h1>
</div></header>
<main class="od-wrap" id="app"><div class="od-card">Loading…</div></main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js?v=20260717b"></script>
<script>
(async function(){
  const app=document.getElementById("app");
  const fmt=d=>d?new Date(d).toLocaleDateString(undefined,{year:"numeric",month:"long",day:"numeric"}):"—";
  const fmtT=d=>d?new Date(d).toLocaleString(undefined,{dateStyle:"medium",timeStyle:"short"}):"—";
  const esc=s=>String(s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
  if(!LMS_CONFIG.SUPABASE_URL||!LMS_CONFIG.SUPABASE_ANON_KEY){
    app.innerHTML=`<div class="od-card"><h2>Not configured</h2><p>Fill in <code>js/config.js</code> first (see supabase/SETUP.md).</p></div>`; return;
  }
  const sb=supabase.createClient(LMS_CONFIG.SUPABASE_URL,LMS_CONFIG.SUPABASE_ANON_KEY);
  async function rpc(fn,args){ const {data,error}=await sb.rpc(fn,args||{}); if(error) throw error; return data; }

  let {data:{session}}=await sb.auth.getSession();
  if(!session){
    app.innerHTML=`<div class="od-card" style="max-width:460px;margin:24px auto"><h2>Owner Sign-in</h2>
      <p class="od-small">Sign in with the owner email. (Create this user first in Supabase → Authentication → Add user.)</p>
      <div style="display:flex;gap:8px"><input id="em" type="email" placeholder="owner@example.com" style="flex:1"><button id="go">Send link</button></div>
      <p class="od-err" id="err"></p></div>`;
    document.getElementById("go").onclick=async()=>{
      const {error}=await sb.auth.signInWithOtp({email:document.getElementById("em").value.trim(),
        options:{shouldCreateUser:false, emailRedirectTo:location.href.split("#")[0]}});
      document.getElementById("err").innerHTML=error?esc(error.message):
        '<span style="color:#166534">Check your email and open the sign-in link on THIS device.</span>';
    };
    return;
  }
  main();

  async function main(){
    /* bootstrap path: first ever signed-in user claims ownership */
    const {data:members}=await sb.from("organization_members").select("role").eq("role","owner");
    const isOwner=(members||[]).length>0 && (await sb.from("organization_members").select("user_id").eq("user_id",session.user.id).eq("role","owner")).data?.length>0;
    if(!(members||[]).length){
      app.innerHTML=`<div class="od-card"><h2>First-time setup</h2>
        <p>No owner exists yet. As the first signed-in user, you can claim ownership of this site.</p>
        <div style="display:flex;gap:8px"><input id="orgName" placeholder="Studio name (e.g. Mia Music Studio)" style="flex:1">
        <button id="claim">Claim ownership</button></div><p class="od-err" id="err"></p></div>`;
      document.getElementById("claim").onclick=async()=>{
        try{ const r=await rpc("bootstrap_owner",{p_org_name:document.getElementById("orgName").value.trim()||"My Studio"});
          if(r.ok) main(); else document.getElementById("err").textContent=r.error; }
        catch(e){ document.getElementById("err").textContent=e.message; }
      };
      return;
    }
    if(!isOwner){
      app.innerHTML=`<div class="od-card od-err">This account is not the owner. <button onclick="location.href='teacher.html'">Go to Teacher Dashboard</button></div>`;
      return;
    }
    render();
  }

  async function render(){
    const {data:teachers,error}=await sb.from("approved_teachers").select("*").order("invited_at",{ascending:false});
    if(error){ app.innerHTML=`<div class="od-card od-err">${esc(error.message)}</div>`; return; }
    const {data:audit}=await sb.from("audit_logs").select("*").order("created_at",{ascending:false}).limit(40);
    app.innerHTML=`
    <div class="od-card"><h2 style="margin-top:0">Approved Teachers</h2>
      <p class="od-small">Only emails on this list can use the Teacher Dashboard. Two steps to invite:
      ① add the email here, ② in Supabase → Authentication → Users → <b>Invite user</b> with the same
      email (that sends the invitation email). Revoking here blocks access immediately.</p>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <input id="tEmail" type="email" placeholder="teacher@example.com" style="flex:1;min-width:220px">
        <button id="tAdd">Add / Invite</button>
        <button onclick="location.reload()">Refresh</button>
        <button id="signout">Sign out</button></div>
      <p class="od-err" id="err"></p>
      <table class="od-tbl"><tr><th>Email</th><th>Status</th><th>Invited</th><th>Accepted</th><th>Revoked</th><th>By</th><th></th></tr>`+
      (teachers||[]).map(t=>`<tr>
        <td>${esc(t.email)}</td>
        <td class="st-${t.status}">${t.status}</td>
        <td>${fmt(t.invited_at)}</td><td>${fmt(t.accepted_at)}</td><td>${fmt(t.revoked_at)}</td>
        <td class="od-small">${esc(t.acted_by||"")}</td>
        <td>${t.status==="revoked"
            ?`<button data-re="${esc(t.email)}">Reactivate</button>`
            :`<button data-rv="${esc(t.email)}">Revoke</button>`}
          ${t.status==="pending"?`<span class="od-small">(resend: Supabase → Users → Invite again)</span>`:""}</td></tr>`).join("")+
      `</table></div>
    <div class="od-card"><h2 style="margin-top:0">Recent Activity (audit log)</h2>
      <table class="od-tbl"><tr><th>When</th><th>Who</th><th>Action</th><th>Details</th></tr>`+
      (audit||[]).map(a=>`<tr><td>${fmtT(a.created_at)}</td><td>${esc(a.actor_email||"")}</td>
        <td>${esc(a.action)}</td><td class="od-small">${esc(JSON.stringify(a.details||{}).slice(0,120))}</td></tr>`).join("")+
      `</table></div>`;
    document.getElementById("signout").onclick=async()=>{ await sb.auth.signOut(); location.reload(); };
    document.getElementById("tAdd").onclick=async()=>{
      const em=document.getElementById("tEmail").value.trim();
      if(!em) return;
      try{ await rpc("owner_set_teacher",{p_email:em,p_status:"pending"});
        alert("Added to the allowlist.\n\nNow send the sign-in invitation:\nSupabase → Authentication → Users → Invite user → "+em);
        render(); }
      catch(e){ document.getElementById("err").textContent=e.message; }
    };
    app.querySelectorAll("[data-rv]").forEach(b=>b.onclick=async()=>{
      if(!confirm("Revoke "+b.dataset.rv+"? They lose access immediately.")) return;
      await rpc("owner_set_teacher",{p_email:b.dataset.rv,p_status:"revoked"}); render();
    });
    app.querySelectorAll("[data-re]").forEach(b=>b.onclick=async()=>{
      await rpc("owner_set_teacher",{p_email:b.dataset.re,p_status:"accepted"}); render();
    });
  }
})();
</script>
</body>
</html>
