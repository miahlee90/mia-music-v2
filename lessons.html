<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Lessons · Theory Lab</title>
<link rel="stylesheet" href="css/style.css?v=20260720nav2">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1c1e54">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Theory Lab">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
</head>
<body>
<header class="lesson-header"><div class="inner">
  <div class="crumb">🏠 <a href="https://miahlee90.github.io/">Mia Music Studio</a> › <a href="index.html">Theory Lab</a> › All Lessons &nbsp;·&nbsp; <a href="student.html">My Progress</a></div>
  <h1>All Lessons</h1>
  <div class="progress-line" id="progLine" style="color:#dfe9f2"></div>
  <div class="progress-track"><div class="progress-fill" id="progFill" style="width:0%"></div></div>
</div></header>
<main>
  <input class="searchbox" id="q" placeholder="🔍 Search a topic… (e.g. treble clef, triads, 6/8)">
  <div id="list"></div>
</main>
<script src="js/lessons-data.js?v=20260717b"></script>
<script src="js/staff.js?v=20260718snd"></script>
<script src="js/quiz.js?v=20260717b"></script>
<script src="js/keyboard.js?v=20260717b"></script>
<script>
(function(){
  const prog=Quiz.progress();
  const doneCount=LESSONS.filter(l=>prog[l.n]&&prog[l.n].done).length;
  document.getElementById("progLine").textContent=doneCount+" of "+LESSONS.length+" lessons completed";
  document.getElementById("progFill").style.width=(doneCount/LESSONS.length*100)+"%";
  const list=document.getElementById("list");
  function href(n){ return "lessons/lesson-"+String(n).padStart(2,"0")+".html"; }
  function render(filter){
    filter=(filter||"").toLowerCase();
    let html="";
    UNITS.forEach(u=>{
      const ls=LESSONS.filter(l=>l.unit===u.unit &&
        (!filter || (l.title+" "+(l.kw||[]).join(" ")).toLowerCase().includes(filter)));
      if(!ls.length) return;
      const open = filter? " open" : (u.unit===1?" open":"");
      html+=`<div class="unit-group${open}">
        <div class="unit-head" onclick="this.parentElement.classList.toggle('open')">
          <span>Unit ${u.unit} — ${u.name}</span><span>▾</span></div>
        <div class="unit-body">`+
        ls.map(l=>{
          const built=l.n<=BUILT_THROUGH;
          const p=prog[l.n];
          const badge=p&&p.done?`<span class="done">✓ ${p.best}%</span>`:built?"":`<span style="color:#bbb;font-size:13px">coming soon</span>`;
          return built?
            `<a class="lesson-link" href="${href(l.n)}"><span><span class="lnum">${l.label}</span>${l.title}</span>${badge}</a>`:
            `<div class="lesson-link" style="opacity:.55"><span><span class="lnum">${l.label}</span>${l.title}</span>${badge}</div>`;
        }).join("")+`</div></div>`;
    });
    list.innerHTML=html||"<p style='margin-top:20px;color:var(--muted)'>No lessons match — try another word.</p>";
  }
  render();
  document.getElementById("q").addEventListener("input",e=>render(e.target.value));
})();
</script>
<script src="js/config.js?v=20260717b"></script>
<script src="js/lms.js?v=20260717b"></script>
<script src="js/pwa.js?v=20260717b"></script>
</body>
</html>
